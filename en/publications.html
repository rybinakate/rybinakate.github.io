    <style>
        /* Additional styles for the publications page */
        .publications-container {
            max-width: 1000px;
            margin: 0 auto;

        .publications-list {
            list-style: none;
            padding: 0;

            margin-bottom: 1.2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e0e0e0;
            line-height: 1.5;
        }
        
        .publication-link {
            display: inline-block;
            margin-top: 0.3rem;
            font-size: 0.85rem;
            color: #3498db;
            text-decoration: none;
        }
        
        .publication-link:hover {
            text-decoration: underline;
        }
        
        .section-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        @media (max-width: 768px) {
            .publication-authors,
            .publication-title,
            .publication-journal {
                font-size: 0.9rem;
            }
            
            .publication-year {
                font-size: 0.7rem;
            }
        }
    </style>
</head>

        // Render the list
        const listContainer = document.getElementById('publications-list');

        publications.forEach(pub => {
            const li = document.createElement('li');
            
            let html = `
                <span class="publication-authors">${pub.authors}</span>
                <span class="publication-title">«${pub.title}»</span>
                <span class="publication-journal">${pub.journal}</span>, <span class="publication-year">${pub.year}</span>
            `;
            
            if (pub.url) {
                html += `<br><a href="${pub.url}" class="publication-link" target="_blank">🔗 Link to publication</a>`;
            }
            
            li.innerHTML = html;
            listContainer.appendChild(li);
        });
