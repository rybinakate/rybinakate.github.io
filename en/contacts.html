<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts | Ekaterina Rybina</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <header></header>

    <main>
        <div class="contact-form">
            <h3>Write to me</h3>

            <form action="https://formspree.io/f/mpqojjlv" method="POST">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email for reply:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>

                <button type="submit">Send</button>

                <p class="form-note">Your data will not be shared with third parties</p>
            </form>
        </div>
    </main>

    <footer>
        <p>© 2025 Ekaterina Rybina | Made with ❤️ to GIS</p>
    </footer>

<script src="/js/include-en.js"></script>
<script src="/js/lang-switch.js"></script>

</body>

</html>
